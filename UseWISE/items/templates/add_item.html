{% extends 'base.html' %}

{% block content %}
    <h2>Добави нов предмет</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" style="padding: 10px 20px; background-color: #008CBA; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Запази предмета
        </button>
    </form>
{% endblock %}
