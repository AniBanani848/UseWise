{% extends "base.html" %}

{% block title %}Добави вещ | UseWISE{% endblock %}

{% block content %}
  <section class="card form-errors">
    <h1>Добави нова вещ</h1>
    <p style="color: var(--muted); margin-top: 0;">
      Попълни кратко описание, цена на ден и снимка, за да публикуваш обявата си.
    </p>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="button-row">
        <button type="submit" class="btn btn-primary">Запази вещта</button>
        <a href="{% url 'item_list' %}" class="btn btn-secondary">Назад към каталога</a>
      </div>
    </form>
  </section>
{% endblock %}
