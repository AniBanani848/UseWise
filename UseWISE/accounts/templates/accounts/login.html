{% extends "base.html" %}

{% block title %}Вход | UseWISE{% endblock %}

{% block content %}
  <section class="card form-errors">
    <h1>Вход</h1>
    <form method="post" action="">
      {% csrf_token %}
      {% if form.non_field_errors %}
      {{ form.non_field_errors }}
      {% endif %}
      {{ form.as_p }}
      <div class="button-row">
        <button type="submit" class="btn btn-primary">Влез</button>
        <a class="btn btn-secondary" href="{% url 'accounts:signup' %}">Регистрация</a>
      </div>
    </form>
  </section>
{% endblock %}
